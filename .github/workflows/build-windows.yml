name: Build Windows EXE

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Collect executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null

          if (Test-Path "build/Release/fateInjector.exe") {
            Copy-Item "build/Release/fateInjector.exe" "out/fateInjector.exe" -Force
          }
          elseif (Test-Path "build/fateInjector.exe") {
            Copy-Item "build/fateInjector.exe" "out/fateInjector.exe" -Force
          }
          else {
            Write-Error "fateInjector.exe not found in expected build paths."
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fateInjector-windows-exe
          path: out/fateInjector.exe
          if-no-files-found: error
